<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Não Pisque – Desafio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 12px;
        }
        .game-container {
            text-align: center;
            width: 100%;
            max-width: 550px;
            background: #111;
            border-radius: 40px;
            padding: 16px 12px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .video-wrapper {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 0 3px #ff44cc;
            aspect-ratio: 4 / 3;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }
        .stats {
            background: rgba(0,0,0,0.7);
            border-radius: 32px;
            padding: 12px;
            color: white;
            font-weight: bold;
        }
        .timer-box {
            font-size: 2.2rem;
            font-family: monospace;
            background: #000000aa;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 50px;
            margin-bottom: 8px;
        }
        #timer { color: #ffaa44; font-weight: 800; }
        .record { font-size: 1rem; margin-bottom: 8px; }
        #recordValue { color: #88ff88; font-weight: bold; }
        #status {
            background: #222;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin: 8px 0;
            word-break: break-word;
        }
        button {
            background: #ff44cc;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #992277;
            transition: 0.07s linear;
            width: 80%;
            max-width: 240px;
            margin: 4px auto;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #992277; }
        button:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 5rem;
            font-weight: bold;
            color: white;
            backdrop-filter: blur(8px);
            pointer-events: none;
        }
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.05s linear;
        }
        .invert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 998;
            pointer-events: none;
            mix-blend-mode: difference;
            opacity: 0;
        }
        footer { font-size: 0.65rem; margin-top: 8px; color: #888; }
        .progress-bar {
            width: 80%;
            background-color: #333;
            border-radius: 25px;
            margin: 10px auto;
            overflow: hidden;
            height: 8px;
        }
        .progress-fill {
            display: block;
            height: 100%;
            width: 0%;
            background-color: #ff44cc;
            transition: width 0.2s ease;
        }
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #222;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #ff44cc;
            color: white;
            font-weight: bold;
            z-index: 10;
        }
        @media (max-width: 600px) {
            .lang-selector { top: 10px; right: 10px; font-size: 0.7rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div class="lang-selector" id="langSelector">🌐 English</div>
<div class="game-container">
    <div class="video-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    <div class="stats">
        <div class="timer-box">⏱️ <span id="timer">0.00</span> s</div>
        <div class="record">🏆 <span id="recordLabel">Recorde:</span> <span id="recordValue">0.00</span> s</div>
        <div id="status">📷 Aguardando câmera...</div>
        <div class="progress-bar"><div id="loadProgress" class="progress-fill"></div></div>
        <button id="startBtn" disabled>🔥 COMEÇAR</button>
    </div>
    <footer>⚠️ <span id="footerText">Não pisque! Atrapalhos ativados 😈</span></footer>
</div>
<div id="flashOverlay" class="flash-overlay"></div>
<div id="invertOverlay" class="invert-overlay"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.6"></script>

<script>
    // ---------- TRADUÇÕES ----------
    const translations = {
        pt: {
            recordLabel: "Recorde:", footerText: "Não pisque! Atrapalhos ativados 😈", startBtn: "🔥 COMEÇAR",
            cameraWaiting: "📷 Aguardando câmera...", cameraOk: "📷 Câmera OK. Carregando IA...", iaSuccess: "✅ IA carregada! Clique em COMEÇAR.",
            iaError: "❌ Falha ao carregar IA. Verifique os arquivos em /models/facemesh/", countdownPrepare: "⏰ Prepare-se...",
            gameActive: "🔥 NÃO PIQUE!! Atrapalhos ativados 🔥", gameOverBlink: (t, r) => `💀 PISCOU! ${t}s. 🏆 NOVO RECORDE! 🏆`,
            gameOverNormal: (t, r) => `😵 Piscou! ${t}s. Recorde: ${r}s.`, playAgain: "JOGAR NOVAMENTE", playing: "JOGANDO...",
            cameraError: "❌ Erro na câmera. Recarregue e permita.", reloadButton: "🔄 RECARREGAR"
        },
        en: {
            recordLabel: "Record:", footerText: "Don't blink! Random distractions 😈", startBtn: "🔥 START",
            cameraWaiting: "📷 Waiting for camera...", cameraOk: "📷 Camera OK. Loading AI...", iaSuccess: "✅ AI loaded! Click START.",
            iaError: "❌ Failed to load AI. Check /models/facemesh/ files", countdownPrepare: "⏰ Get ready...",
            gameActive: "🔥 DON'T BLINK!! Distractions active 🔥", gameOverBlink: (t, r) => `💀 BLINK! ${t}s. 🏆 NEW RECORD! 🏆`,
            gameOverNormal: (t, r) => `😵 You blinked! ${t}s. Record: ${r}s.`, playAgain: "PLAY AGAIN", playing: "PLAYING...",
            cameraError: "❌ Camera error. Reload and allow.", reloadButton: "🔄 RELOAD"
        }
    };
    let currentLang = 'pt';
    function t(key, ...args) {
        let text = translations[currentLang][key];
        if (typeof text === 'function') return text(...args);
        return text || key;
    }
    function updateUITexts() {
        document.getElementById('recordLabel').innerText = t('recordLabel');
        document.getElementById('footerText').innerText = t('footerText');
        if (!gameRunning && !countdownActive && !gameActive && !loadingInProgress) startBtn.innerText = t('startBtn');
        else if (gameRunning) startBtn.innerText = t('playing');
        else if (!startBtn.disabled && !gameActive) startBtn.innerText = t('startBtn');
    }

    // ---------- ELEMENTOS ----------
    const video = document.getElementById('webcam');
    const startBtn = document.getElementById('startBtn');
    const timerSpan = document.getElementById('timer');
    const recordSpan = document.getElementById('recordValue');
    const statusSpan = document.getElementById('status');
    const flashOverlay = document.getElementById('flashOverlay');
    const invertOverlay = document.getElementById('invertOverlay');
    const progressFill = document.getElementById('loadProgress');
    const langSelector = document.getElementById('langSelector');

    // ---------- ESTADO DO JOGO ----------
    let gameRunning = false, gameActive = false, startTime = 0, currentTime = 0, animFrame = null;
    let blinkDetected = false, countdownActive = false, loadingInProgress = false;
    let record = localStorage.getItem('noBlinkRecord') || 0;
    recordSpan.innerText = record.toFixed(2);
    let detector = null, disturbanceInterval = null, audioCtx = null, beepSound = null;

    // ---------- ÁUDIO ----------
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        beepSound = () => {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 1800;
            gain.gain.value = 0.3;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.3);
            osc.stop(now + 0.25);
        };
    }
    function playSound() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume().then(() => beepSound && beepSound());
        else beepSound && beepSound();
    }

    // ---------- ATIRAPALHOS ----------
    function triggerFlash() { flashOverlay.style.opacity = '1'; setTimeout(() => flashOverlay.style.opacity = '0', 100); }
    function triggerInvert() { invertOverlay.style.opacity = '1'; setTimeout(() => invertOverlay.style.opacity = '0', 500); }
    function triggerVibrate() { if (navigator.vibrate) navigator.vibrate(200); }
    function randomDisturbance() {
        if (!gameRunning) return;
        const rand = Math.random();
        if (rand < 0.25) triggerFlash();
        else if (rand < 0.5) triggerInvert();
        else if (rand < 0.75) triggerVibrate();
        else playSound();
    }
    function startDisturbances() {
        if (disturbanceInterval) clearInterval(disturbanceInterval);
        disturbanceInterval = setInterval(() => { if (gameRunning && Math.random() < 0.4) randomDisturbance(); }, 2500);
    }
    function stopDisturbances() { if (disturbanceInterval) { clearInterval(disturbanceInterval); disturbanceInterval = null; } }

    // ---------- CÂMERA E MODELO LOCAL ----------
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            await video.play();
            statusSpan.innerText = t('cameraOk');
            await loadModelFromLocal();
        } catch (err) {
            console.error(err);
            statusSpan.innerHTML = t('cameraError');
            startBtn.disabled = true;
            showReloadButton();
        }
    }

    function showReloadButton() {
        const btnReload = document.createElement('button');
        btnReload.innerText = t('reloadButton');
        btnReload.style.background = '#ffaa44';
        btnReload.style.marginTop = '10px';
        btnReload.style.fontSize = '1rem';
        btnReload.onclick = () => location.reload();
        statusSpan.parentElement.appendChild(btnReload);
    }

    async function loadModelFromLocal() {
        if (loadingInProgress) return;
        loadingInProgress = true;
        startBtn.disabled = true;
        progressFill.style.width = '0%';

        try {
            // Força backend WebGL (mais rápido)
            await tf.setBackend('webgl');
            await tf.ready();
            console.log("Backend TFJS:", tf.getBackend());

            // Configuração para carregar modelo a partir dos arquivos locais
            const model = faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh;
            const detectorConfig = {
                runtime: 'mediapipe',
                solutionPath: './models/facemesh',   // PASTA ONDE ESTÃO OS ARQUIVOS
                maxFaces: 1,
                refineLandmarks: true,
                // Infelizmente não há callback de progresso oficial, mas vamos simular baseado no tempo
            };
            
            // Simulação de progresso enquanto aguarda o download real
            let progress = 0;
            const fakeInterval = setInterval(() => {
                if (progress < 90) {
                    progress += 5;
                    progressFill.style.width = progress + '%';
                }
            }, 150);
            
            detector = await faceLandmarksDetection.createDetector(model, detectorConfig);
            clearInterval(fakeInterval);
            progressFill.style.width = '100%';
            setTimeout(() => progressFill.style.width = '0%', 800);
            
            statusSpan.innerHTML = t('iaSuccess');
            startBtn.disabled = false;
            startBtn.innerText = t('startBtn');
            loadingInProgress = false;
            
            // Inicia loop de detecção
            requestAnimationFrame(detectionLoop);
            
        } catch (err) {
            console.error("Erro ao carregar modelo local:", err);
            statusSpan.innerHTML = t('iaError');
            loadingInProgress = false;
            showReloadButton();
        }
    }

    // ---------- DETECÇÃO DE PISCADA (EAR) ----------
    async function detectionLoop() {
        if (!detector || !gameRunning || blinkDetected) {
            requestAnimationFrame(detectionLoop);
            return;
        }
        try {
            const faces = await detector.estimateFaces(video);
            if (faces.length > 0) {
                const face = faces[0];
                const leftEye = face.keypoints.filter(kp => kp.name === 'leftEye');
                const rightEye = face.keypoints.filter(kp => kp.name === 'rightEye');
                if (leftEye.length > 0 && rightEye.length > 0) {
                    const leftOpen = calculateEyeOpenness(leftEye);
                    const rightOpen = calculateEyeOpenness(rightEye);
                    const avgOpen = (leftOpen + rightOpen) / 2;
                    if (avgOpen < 0.2) {   // piscou!
                        blinkDetected = true;
                        endGame();
                    }
                }
            }
        } catch(e) { console.warn(e); }
        requestAnimationFrame(detectionLoop);
    }

    function calculateEyeOpenness(keypoints) {
        if (keypoints.length < 4) return 1;
        const sortedByY = [...keypoints].sort((a, b) => a.y - b.y);
        const top = sortedByY[0], bottom = sortedByY[sortedByY.length - 1];
        const sortedByX = [...keypoints].sort((a, b) => a.x - b.x);
        const left = sortedByX[0], right = sortedByX[sortedByX.length - 1];
        const vertical = Math.hypot(top.x - bottom.x, top.y - bottom.y);
        const horizontal = Math.hypot(left.x - right.x, left.y - right.y);
        return vertical / horizontal;
    }

    // ---------- CRONOMETRO E FIM DE JOGO ----------
    function updateTimer() {
        if (!gameRunning) return;
        const now = performance.now();
        currentTime = (now - startTime) / 1000;
        timerSpan.innerText = currentTime.toFixed(2);
        animFrame = requestAnimationFrame(updateTimer);
    }

    function endGame() {
        if (!gameRunning) return;
        gameRunning = false;
        gameActive = false;
        stopDisturbances();
        cancelAnimationFrame(animFrame);
        const finalTime = currentTime;
        if (finalTime > record) {
            record = finalTime;
            recordSpan.innerText = record.toFixed(2);
            localStorage.setItem('noBlinkRecord', record);
            statusSpan.innerHTML = t('gameOverBlink', finalTime.toFixed(2), record.toFixed(2));
        } else {
            statusSpan.innerHTML = t('gameOverNormal', finalTime.toFixed(2), record.toFixed(2));
        }
        startBtn.innerText = t('playAgain');
        startBtn.disabled = false;
    }

    function startCountdown() {
        if (gameActive) return;
        gameActive = true;
        countdownActive = true;
        startBtn.disabled = true;
        statusSpan.innerText = t('countdownPrepare');
        let count = 3;
        const overlay = document.createElement('div');
        overlay.className = 'countdown-overlay';
        overlay.innerText = count;
        document.body.appendChild(overlay);
        const interval = setInterval(() => {
            count--;
            if (count > 0) overlay.innerText = count;
            else if (count === 0) {
                overlay.innerText = "VAI! / GO!";
                setTimeout(() => {
                    overlay.remove();
                    startGameReal();
                }, 300);
                clearInterval(interval);
            } else clearInterval(interval);
        }, 1000);
    }

    function startGameReal() {
        countdownActive = false;
        gameRunning = true;
        blinkDetected = false;
        startTime = performance.now();
        currentTime = 0;
        timerSpan.innerText = "0.00";
        updateTimer();
        startDisturbances();
        statusSpan.innerHTML = t('gameActive');
        startBtn.innerText = t('playing');
        startBtn.disabled = true;
    }

    function onStartClick() {
        if (gameRunning || countdownActive || loadingInProgress) return;
        if (!detector) {
            statusSpan.innerHTML = t('iaError');
            return;
        }
        initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        startCountdown();
    }

    startBtn.onclick = onStartClick;
    setupCamera();

    window.addEventListener('load', () => {
        flashOverlay.style.opacity = '0';
        invertOverlay.style.opacity = '0';
    });

    // SELETOR DE IDIOMA
    langSelector.addEventListener('click', () => {
        currentLang = currentLang === 'pt' ? 'en' : 'pt';
        langSelector.innerText = currentLang === 'pt' ? '🌐 English' : '🌐 Português';
        updateUITexts();
        if (!gameRunning && !countdownActive && !gameActive && !loadingInProgress) {
            if (detector) statusSpan.innerHTML = t('iaSuccess');
            else if (video.srcObject) statusSpan.innerHTML = t('cameraOk');
            else statusSpan.innerHTML = t('cameraWaiting');
        } else if (gameRunning) statusSpan.innerHTML = t('gameActive');
        else if (countdownActive) statusSpan.innerHTML = t('countdownPrepare');
    });
</script>
</body>
</html>
